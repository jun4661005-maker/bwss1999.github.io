<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美河市運動會館 - 教室行事曆</title>
    
    <style>
        /* 基礎樣式重設與字體 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; color: #333; background-color: #f8f9fa; }
        
        /* 頂部導覽列 */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background-color: #fff; border-bottom: 1px solid #eaeaea; }
        .logo { font-size: 1.2rem; font-weight: bold; color: #555; }
        nav a { text-decoration: none; color: #666; margin-left: 20px; font-size: 0.95rem; }
        nav a.active { color: #d32f2f; font-weight: bold; border-bottom: 2px solid #d32f2f; padding-bottom: 5px; }

        /* 橫幅與標題區 */
        .banner { background: linear-gradient(135deg, #e05c36 0%, #fa4623 100%); color: white; text-align: center; padding: 60px 20px; }
        .banner h1 { font-size: 2.2rem; margin-bottom: 10px; font-weight: 500; }
        .banner p { font-size: 1rem; opacity: 0.9; }

        /* 預約須知區塊 */
        .notice-container { max-width: 900px; margin: 30px auto 0 auto; padding: 0 20px; }
        .notice-box { background-color: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #d32f2f; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .notice-box h3 { color: #d32f2f; font-size: 1.1rem; margin-bottom: 8px; }
        .notice-box p { color: #666; font-size: 0.9rem; line-height: 1.5; }
        .notice-box strong { color: #333; }

        /* 主要內容區 */
        .main-content { max-width: 900px; margin: 30px auto 60px auto; padding: 0 20px; }
        .section-title { font-size: 1.5rem; margin-bottom: 15px; font-weight: bold; color: #222; }

        /* 條列式行事曆容器樣式 */
        #calendar-container { background-color: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        #loading { text-align: center; font-size: 1.1rem; color: #666; padding: 20px 0; }
        
        /* 條列清單樣式 */
        .event-list { list-style: none; }
        .event-item { padding: 15px 0; border-bottom: 1px solid #eee; }
        .event-item:last-child { border-bottom: none; }
        .event-title { font-size: 1.1rem; font-weight: bold; color: #222; margin-bottom: 5px; }
        .event-time { font-size: 0.9rem; color: #666; }
        .no-events { text-align: center; color: #888; padding: 20px 0; }

        /* 頁尾 */
        footer { background-color: #fff; text-align: center; padding: 30px 20px; font-size: 0.85rem; color: #777; border-top: 1px solid #eaeaea; line-height: 1.8; }
    </style>
</head>
<body>

    <!-- 頂部導覽列 -->
    <header>
        <div class="logo">美河市會館</div>
        <nav>
            <a href="#">首頁</a>
            <a href="#">會館設施</a>
            <a href="#" class="active">教室行事曆</a>
            <a href="#">最新消息</a>
        </nav>
    </header>

    <!-- 橫幅區 -->
    <div class="banner">
        <h1>韻律教室預約</h1>
        <p>查看會館課程與租借時段</p>
    </div>

    <!-- 預約須知 -->
    <div class="notice-container">
        <div class="notice-box">
            <h3>預約須知</h3>
            <p>韻律教室開放 <strong>7 日內</strong> 預約，請先至櫃檯登記扣點後才算預約完成。</p>
        </div>
    </div>

    <!-- 主要行事曆區塊 -->
    <div class="main-content">
        <div class="section-title">教室近期日程</div>

        <!-- 日曆資料輸出目標 DIV -->
        <div id="calendar-container">
            <div id="loading">日曆資料載入中...</div>
            <div class="calendar-wrapper" style="max-width: 800px; margin: 0 auto;">
    
    <!-- 最簡單的內嵌方式 -->
    
<iframe src="https://calendar.google.com/calendar/embed?height=600&wkst=2&ctz=Asia%2FTaipei&showPrint=0&src=Yndzc21oY2l0eUBnbWFpbC5jb20&src=MWQzZjI2MzIyZjVjN2U4NDY4NjYzNzM1MTU0MzJlZWFmYzc1M2RmM2E3OWJmOThiNmU1ODA0YjIwYzUzY2M4YUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=ZmFlZjg2MzNjMDgyZmRiMTkwZmI0MzhkMTNjYWQyNWM5NDc3NTU3OWI3YzRiZDE1NTc1YWU5MDAyM2MwYmNiN0Bncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=ZWIzZTgxZjBlNDA5OTYyMzFiNWJmM2QxMTYzOGViYTBjMDgzOTViNjI4MTk1NjcyNTJjNzNhN2Q1YTU5MDhhOUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=NjlkNmRhNTA5MjJkMTJkOGRhOGYyNWNlNjBmZTY2NDZlYjU2MjEzZjhjZDU1NTdiZDRjNzZjNzBlYjE1MmZkOUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=emgtdHcudGFpd2FuI2hvbGlkYXlAZ3JvdXAudi5jYWxlbmRhci5nb29nbGUuY29t&color=%23039be5&color=%23d50000&color=%23f09300&color=%238e24aa&color=%230b8043&color=%230b8043" style="border:solid 1px #777" width="800" height="600" frameborder="0" scrolling="no"></iframe>        </div>
    </div>

    <!-- 頁尾 -->
    <footer>
        <p><strong>美河市運動會館</strong> | 管理單位: 奕澤健康事業有限公司</p>
        <p>營業時間: 週二至週日 13:00 - 22:00 | 聯絡電話: 02-29106346</p>
    </footer>

    <script>
        // GAS Web App URL
        const gasUrl = "https://script.google.com/macros/s/AKfycbxlaY3pbh7yu61usAppdQlUxK49Td0Fdf-7MV9WdkCQsrK_lBXAsuqjnhWMNHJX-cLY/exec"; 

        async function fetchCalendar() {
            const loadingEl = document.getElementById('loading');
            const targetDiv = document.getElementById('calendar-data');
            
            try {
                const response = await fetch(gasUrl);
                const events = await response.json();
                
                // 隱藏載入中文字
                loadingEl.style.display = 'none';
                
                if (!events || events.length === 0) {
                    targetDiv.innerHTML = '<p class="no-events">近期沒有活動日程。</p>';
                    return;
                }
                
                // 依序組裝 HTML 純文字列表
                let htmlContent = '<ul class="event-list">';
                events.forEach(event => {
                    htmlContent += `
                        <li class="event-item">
                            <div class="event-title">${event.title}</div>
                            <div class="event-time">時間：${event.startTime} ～ ${event.endTime}</div>
                        </li>`;
                });
                htmlContent += '</ul>';
                
                // 輸出到網頁的 DIV 中
                targetDiv.innerHTML = htmlContent;
                
            } catch (error) {
                console.error('預覽日曆失敗:', error);
                loadingEl.style.display = 'none';
                targetDiv.innerHTML = '<p class="no-events" style="color: #d32f2f;">無法載入日曆資料，請確認 API 權限或網路連線。</p>';
            }
        }

        // 網頁載入完成後執行
        document.addEventListener('DOMContentLoaded', fetchCalendar);
    </script>
</body>
</html>
