<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美河市運動會館 -藍鯨游泳學校美河市校區 歡迎光臨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Hiragino Sans GB", "Heiti TC", "Microsoft JhengHei", sans-serif;
        }
        body {
            color: #333;
            background-color: #f9f9f9;
        }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }
        @media (min-width: 768px) {
            header {
                padding: 20px 50px;
            }
        }
        .logo {
            font-size: 18px;
            font-weight: bold;
        }
        @media (min-width: 768px) {
            .logo {
                font-size: 20px;
            }
        }
        nav {
            display: flex;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
        }
        nav a {
            text-decoration: none;
            color: #333;
            margin-left: 12px;
            font-size: 13px;
            padding-bottom: 3px;
        }
        @media (min-width: 768px) {
            nav a {
                margin-left: 20px;
                font-size: 14px;
                padding-bottom: 5px;
            }
        }
        nav a.active {
            color: #e60012;
            border-bottom: 2px solid #e60012;
        }

        /* --- Hero 7張圖片輪播 --- */
        .hero-slider {
            position: relative;
            height: 280px;
            overflow: hidden;
            margin-top: 55px;
        }
        @media (min-width: 768px) {
            .hero-slider {
                height: 480px;
                margin-top: 70px;
            }
        }
        .slides {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-shadow: 0 2px 6px rgba(0,0,0,0.7);
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            z-index: 1;
            padding: 0 20px;
            text-align: center;
        }
        .slide.active {
            opacity: 1;
            z-index: 2;
        }
        .slide h1 {
            font-size: 26px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        @media (min-width: 768px) {
            .slide h1 {
                font-size: 46px;
                margin-bottom: 12px;
                letter-spacing: 2px;
            }
        }
        .slide p {
            font-size: 14px;
        }
        @media (min-width: 768px) {
            .slide p {
                font-size: 18px;
            }
        }
        .slider-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .dot {
            width: 10px;
            height: 10px;
            background-color: rgba(255,255,255,0.4);
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .dot.active {
            background-color: #fff;
        }
        /* 最新消息主要橫幅 (橘紅漸層) */
        .banner { background: linear-gradient(135deg, #e05c36 0%, #fa4623 100%); color: white; text-align: center; padding: 80px 20px; }
        .banner h1 { font-size: 2.5rem; margin-bottom: 15px; font-weight: bold; letter-spacing: 2px; }
        .banner p { font-size: 1.1rem; opacity: 0.9; font-style: italic; }

        /* --- 快捷連結區 --- */
        .quick-links {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }
        @media (min-width: 768px) {
            .quick-links {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
                margin: 30px auto;
                padding: 0 20px;
            }
        }
        .link-card {
            background: #fff;
            padding: 18px 12px;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            text-align: center;
            text-decoration: none;
            color: #333;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        .link-card h3 {
            font-size: 14px;
            margin-bottom: 4px;
        }
        @media (min-width: 768px) {
            .link-card h3 {
                font-size: 16px;
                margin-bottom: 6px;
            }
        }
        .link-card p {
            font-size: 11px;
            color: #777;
        }
        @media (min-width: 768px) {
            .link-card p {
                font-size: 12px;
            }
        }

        /* --- 水池溫度顯示區 --- */
        .water-temp-section {
            max-width: 1200px;
            margin: 0 auto 25px auto;
            padding: 0 15px;
        }
        @media (min-width: 768px) {
            .water-temp-section {
                margin: 0 auto 40px auto;
                padding: 0 20px;
            }
        }
        .temp-container {
            background: #fff5f5;
            border: 1px solid #ffe3e3;
            border-radius: 6px;
            padding: 15px;
        }
        @media (min-width: 768px) {
            .temp-container {
                padding: 20px;
            }
        }
        .temp-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ffd8d8;
            padding-bottom: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #e60012;
            font-weight: bold;
        }
        @media (min-width: 768px) {
            .temp-header {
                font-size: 14px;
            }
        }
        .temp-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            text-align: center;
        }
        @media (min-width: 768px) {
            .temp-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 0;
            }
        }
        .temp-item {
            padding: 5px 0;
        }
        .temp-item h4 {
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
        }
        @media (min-width: 768px) {
            .temp-item h4 {
                font-size: 14px;
                margin-bottom: 10px;
            }
        }
        .temp-item .val {
            font-size: 16px;
            font-weight: bold;
            color: #e60012;
        }

        /* --- 最新消息區 --- */
        .news-section {
            max-width: 1200px;
            margin: 0 auto 40px auto;
            padding: 0 15px;
        }
        @media (min-width: 768px) {
            .news-section {
                padding: 0 20px;
            }
        }
        .news-section h2 {
            font-size: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (min-width: 768px) {
            .news-section h2 {
                font-size: 22px;
            }
        }
        .news-section h2 a {
            font-size: 13px;
            color: #888;
            text-decoration: none;
        }
        .news-item {
            background: #fff;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .news-item h3 {
            font-size: 13px;
            font-weight: normal;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }
        @media (min-width: 768px) {
            .news-item h3 {
                font-size: 15px;
            }
        }
        .news-item .date {
            color: #999;
            font-size: 12px;
            white-space: nowrap;
        }

        /* --- Footer --- */
        footer {
            background: #fff;
            border-top: 1px solid #eee;
            padding: 25px 15px;
            text-align: center;
            font-size: 12px;
            color: #666;
            line-height: 1.7;
        }
    </style>
</head>

        <div class="banner">

        <p>掌握會館最新動態與活動資訊</p>
    </div>
<!-- 主要最新消息列表區 -->
    <div class="main-content">

    <footer>
